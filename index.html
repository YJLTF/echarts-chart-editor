<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECharts 图表编辑器</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"><\/script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3v18h18"/>
            <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
          </svg>
        </div>
        <h1>Chart Studio</h1>
        <span class="subtitle">ECharts 可视化编辑器</span>
      </div>
      <div class="header-right">
        <button class="btn btn-ghost" id="themeToggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <span>主题</span>
        </button>
        <button class="btn btn-ghost" id="importBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>导入</span>
        </button>
        <button class="btn btn-primary" id="exportBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>导出配置</span>
        </button>
        <button class="btn btn-primary" id="downloadBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>下载图片</span>
        </button>
      </div>
    </header>
 
    <div class="main">
      <aside class="sidebar sidebar-left">
        <div class="sidebar-header">
          <h2>图表类型</h2>
        </div>
        <div class="chart-types">
          <div class="chart-category">
            <span class="category-title">基础图表</span>
            <div class="chart-grid">
              <div class="chart-item active" data-type="line">
                <div class="chart-icon">
                  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 40L16 24L26 30L44 8"/>
                    <circle cx="16" cy="24" r="2" fill="currentColor"/>
                    <circle cx="26" cy="30" r="2" fill="currentColor"/>
                    <circle cx="44" cy="8" r="2" fill="currentColor"/>
                  </svg>
                </div>
                <span>折线图</span>
              </div>
              <div class="chart-item" data-type="bar">
                <div class="chart-icon">
                  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="8" y="16" width="8" height="24"/>
                    <rect x="22" y="8" width="8" height="32"/>
                    <rect x="36" y="24" width="8" height="16"/>
                  </svg>
                </div>
                <span>柱状图</span>
              </div>
              <div class="chart-item" data-type="pie">
                <div class="chart-icon">
                  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M24 4A20 20 0 1 1 24 44A20 20 0 1 1 24 4"/>
                    <path d="M24 24L24 4A20 20 0 0 1 44 24Z" fill="currentColor" opacity="0.3"/>
                  </svg>
                </div>
                <span>饼图</span>
              </div>
              <div class="chart-item" data-type="scatter">
                <div class="chart-icon">
                  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="16" r="3" fill="currentColor"/>
                    <circle cx="24" cy="28" r="3" fill="currentColor"/>
                    <circle cx="36" cy="12" r="3" fill="currentColor"/>
                    <circle cx="18" cy="36" r="3" fill="currentColor"/>
                    <circle cx="38" cy="32" r="3" fill="currentColor"/>
                  </svg>
                </div>
                <span>散点图</span>
              </div>
            </div>
          </div>
          <div class="chart-category">
            <span class="category-title">统计图表</span>
            <div class="chart-grid">
              <div class="chart-item" data-type="radar">
                <div class="chart-icon">
                  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="24,4 44,18 36,42 12,42 4,18"/>
                    <polygon points="24,12 36,20 32,36 16,36 12,20" fill="currentColor" opacity="0.3"/>
                  </svg>
                </div>
                <span>雷达图</span>
              </div>
              <div class="chart-item" data-type="gauge">
                <div class="chart-icon">
                  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 36A20 20 0 0 1 40 36" fill="none"/>
                    <line x1="24" y1="36" x2="24" y2="16" stroke-width="2"/>
                    <circle cx="24" cy="36" r="3" fill="currentColor"/>
                  </svg>
                </div>
                <span>仪表盘</span>
              </div>
              <div class="chart-item" data-type="funnel">
                <div class="chart-icon">
                  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="4,6 44,6 32,24 16,24"/>
                    <polygon points="16,26 32,26 28,42 20,42"/>
                  </svg>
                </div>
                <span>漏斗图</span>
              </div>
              <div class="chart-item" data-type="pictorialBar">
                <div class="chart-icon">
                  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="8" y="20" width="8" height="20"/>
                    <rect x="22" y="12" width="8" height="28"/>
                    <rect x="36" y="28" width="8" height="12"/>
                    <line x1="8" y1="20" x2="16" y2="20" stroke-dasharray="2"/>
                    <line x1="22" y1="12" x2="30" y2="12" stroke-dasharray="2"/>
                    <line x1="36" y1="28" x2="44" y2="28" stroke-dasharray="2"/>
                  </svg>
